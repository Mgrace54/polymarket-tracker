name: polymarket-compute-signals

on:
  schedule:
    - cron: "0 */6 * * *"    # every 6 hours at :00
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run compute signals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python compute_signals.py
